services:
  postgres:
    image: postgres:16-alpine
    container_name: artsee-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: artsee
      POSTGRES_PASSWORD: artsee
      POSTGRES_DB: artsee_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artsee -d artsee_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
